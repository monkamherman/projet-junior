# Configuration par défaut
x-defaults: &defaults
  restart: unless-stopped
  stop_grace_period: 60s
  stop_signal: SIGTERM
  healthcheck:
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 40s

# Réseau personnalisé pour une meilleure isolation
networks:
  app-network:
    driver: bridge

# Volumes pour la persistance des données
volumes:
  mongodb_data:
  certificates_data:
  attestations_data:
  receipts_data:

services:
  # Reverse Proxy Nginx - Point d'entrée principal
  nginx:
    <<: *defaults
    container_name: centic-nginx
    image: ghcr.io/monkamherman/projet-junior-nginx:${IMAGE_TAG:-latest}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Configuration nginx montée pour faciliter les modifications
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Pour SSL (à configurer plus tard)
      # - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      client:
        condition: service_healthy
      server:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "nginx", "-t"]

  # Service client (Frontend React)
  client:
    <<: *defaults
    container_name: centic-client
    image: ghcr.io/monkamherman/projet-junior-client:${IMAGE_TAG:-latest}
    expose:
      - "80"
    depends_on:
      server:
        condition: service_healthy
    environment:
      - NODE_ENV=production
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:80"]

  # Service serveur (Backend Express)
  server:
    <<: *defaults
    container_name: centic-server
    image: ghcr.io/monkamherman/projet-junior-server:${IMAGE_TAG:-latest}
    expose:
      - "3000"
    depends_on:
      mongodb:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - certificates_data:/app/public/certificates
      - attestations_data:/app/public/attestations
      - receipts_data:/app/public/receipts
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3000/health"]

  # Base de données MongoDB
  mongodb:
    <<: *defaults
    image: mongo:6.0
    container_name: centic-mongodb
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD:-change_this_password}
      - MONGO_INITDB_DATABASE=${MONGO_INITDB_DATABASE:-projet_junior}
    volumes:
      - mongodb_data:/data/db
    expose:
      - "27017"
    networks:
      - app-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh mongodb://${MONGO_INITDB_ROOT_USERNAME:-admin}:${MONGO_INITDB_ROOT_PASSWORD:-change_this_password}@localhost:27017/${MONGO_INITDB_DATABASE:-projet_junior}?authSource=admin --quiet
