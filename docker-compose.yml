# Configuration par défaut
x-defaults: &defaults
  restart: unless-stopped
  stop_grace_period: 60s
  stop_signal: SIGTERM
  healthcheck:
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 40s

# Réseau personnalisé pour une meilleure isolation
networks:
  app-network:
    driver: bridge

# Volumes pour la persistance des données
volumes:
  mongodb_data:
  certificates_data:
  attestations_data:
  receipts_data:

services:
  # Service client (Frontend React) - NPM reverse proxy vers le port 3001
  client:
    <<: *defaults
    container_name: projet-junior-client
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
        VITE_API_URL: ""
    ports:
      - "3001:80"
    depends_on:
      server:
        condition: service_healthy
    environment:
      - NODE_ENV=production
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80"]

  # Service serveur (Backend Express) - NPM reverse proxy vers le port 3002
  server:
    <<: *defaults
    container_name: projet-junior-server
    build:
      context: ./server
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
    ports:
      - "3002:3000"
    depends_on:
      mongodb:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/${MONGO_INITDB_DATABASE}?authSource=admin
      - MONGO_DB_NAME=${MONGO_INITDB_DATABASE:-projet_junior}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-change_this_refresh_secret}
    volumes:
      - certificates_data:/app/public/certificates
      - attestations_data:/app/public/attestations
      - receipts_data:/app/public/receipts
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]

  # Base de données MongoDB (interne uniquement)
  mongodb:
    <<: *defaults
    image: mongo:6.0
    container_name: projet-junior-mongodb
    healthcheck:
      test: ["CMD", "mongosh", "mongodb://${MONGO_INITDB_ROOT_USERNAME:-admin}:${MONGO_INITDB_ROOT_PASSWORD:-change_this_password}@localhost:27017/?authSource=admin", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD:-change_this_password}
      - MONGO_INITDB_DATABASE=${MONGO_INITDB_DATABASE:-projet_junior}
    volumes:
      - mongodb_data:/data/db
    expose:
      - "27017"
    networks:
      - app-network
