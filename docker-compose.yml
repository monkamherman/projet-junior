# Configuration par défaut
x-defaults: &defaults
  restart: unless-stopped
  stop_grace_period: 60s
  stop_signal: SIGTERM
  healthcheck:
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 40s

# Réseau personnalisé pour une meilleure isolation
networks:
  app-network:
    driver: bridge

# Volumes pour la persistance des données
volumes:
  mongodb_data:

services:
  # Reverse Proxy Nginx - Point d'entrée principal
  nginx:
    <<: *defaults
    container_name: projet-junior-nginx
    image: nginx:stable-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Pour SSL (à configurer plus tard)
      # - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      client:
        condition: service_healthy
      server:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "nginx", "-t"]

  # Service client (Frontend React)
  client:
    <<: *defaults
    container_name: projet-junior-client
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
        - VITE_API_URL=https://api.rageai.digital
    expose:
      - "80"
    depends_on:
      server:
        condition: service_healthy
    environment:
      - NODE_ENV=production
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:80"]

  # Service serveur (Backend Express)
  server:
    <<: *defaults
    container_name: projet-junior-server
    build:
      context: ./server
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
    expose:
      - "3000"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGODB_URI=mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/${MONGO_INITDB_DATABASE}?authSource=admin
      - JWT_SECRET=${JWT_SECRET:-your_jwt_secret_key_here}
      - CLIENT_URL=https://centic.rageai.digital
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3000/health"]

  # Base de données MongoDB
  mongodb:
    <<: *defaults
    image: mongo:6.0
    container_name: projet-junior-mongodb
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD:-change_this_password}
      - MONGO_INITDB_DATABASE=${MONGO_INITDB_DATABASE:-projet_junior}
    volumes:
      - mongodb_data:/data/db
    expose:
      - "27017"
    networks:
      - app-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh mongodb://${MONGO_INITDB_ROOT_USERNAME:-admin}:${MONGO_INITDB_ROOT_PASSWORD:-change_this_password}@localhost:27017/${MONGO_INITDB_DATABASE:-projet_junior}?authSource=admin --quiet
