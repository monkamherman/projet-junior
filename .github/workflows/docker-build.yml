# Workflow GitHub Actions pour builder et publier les images Docker sur GHCR
# Déclenché sur push vers main/master ou manuellement

name: Build and Push Docker Images

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag pour les images (ex: v1.0.0)"
        required: false
        default: "latest"

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/projet-junior

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Définir le tag de l'image
        id: tag
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            TAG=${GITHUB_REF#refs/tags/}
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.tag }}" != "" ]]; then
            TAG=${{ inputs.tag }}
          else
            TAG=latest
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Image tag: $TAG"

      - name: Connexion à GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurer Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build et push du client
      - name: Build et push - Client
        uses: docker/build-push-action@v5
        with:
          context: ./client
          file: ./client/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-client:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-client:latest
          build-args: |
            NODE_ENV=production
            VITE_API_URL=https://api.rageai.digital
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build et push du server
      - name: Build et push - Server
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-server:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-server:latest
          build-args: |
            NODE_ENV=production
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build et push du nginx
      - name: Build et push - Nginx
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          file: ./nginx/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-nginx:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-nginx:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Résumé du build
        run: |
          echo "### Images publiées" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- \`ghcr.io/${{ env.IMAGE_PREFIX }}-client:${{ steps.tag.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`ghcr.io/${{ env.IMAGE_PREFIX }}-server:${{ steps.tag.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`ghcr.io/${{ env.IMAGE_PREFIX }}-nginx:${{ steps.tag.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY

  # Déploiement automatique sur le VPS (main/master)
  deploy-vps:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Déploiement sur VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            cd /opt/centic
            export IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }}
            export GHCR_USERNAME=${{ secrets.GHCR_USERNAME }}
            export GHCR_TOKEN=${{ secrets.GHCR_TOKEN }}
            ./deploy.sh ${{ needs.build-and-push.outputs.image_tag }}

  # Déploiement automatique pour les tags
  deploy-vps-tagged:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Déploiement tagged sur VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            cd /opt/centic
            export IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }}
            export GHCR_USERNAME=${{ secrets.GHCR_USERNAME }}
            export GHCR_TOKEN=${{ secrets.GHCR_TOKEN }}
            ./deploy.sh ${{ needs.build-and-push.outputs.image_tag }}
